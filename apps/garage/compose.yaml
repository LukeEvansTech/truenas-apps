---
# NAS Garage (S3 backup target). Adopts the existing data at
# /mnt/pool/apps/garage (buckets/layout persist). rpc_secret/admin_token are
# injected as env from 1Password (NOT in garage.toml -> no secrets in git).
# S3 is fronted by Traefik (HTTPS); admin (3903) stays internal.
# NOTE: the garage-webui service is deferred until the
# op://Home Operations/garage-nas WEBUI_AUTH_USER_PASS field exists
# (do it alongside the producer-keys cutover, then re-add the webui block).
configs:
  garage_config:
    file: ./garage.toml

services:
  garage:
    container_name: garage
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    configs:
      - source: garage_config
        target: /etc/garage.toml
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
    volumes:
      - /mnt/pool/apps/garage/meta:/var/lib/garage/meta
      - /mnt/pool/apps/garage/data:/var/lib/garage/data
    expose: ["3900", "3903"]
    networks: ["traefik_network"]
    labels:
      - "traefik.enable=true"
      # S3 API (path-style), both domains -> used by Veeam, Arq, the k8s sync job
      - "traefik.http.routers.garage-s3.rule=Host(`s3-nas.codelooks.com`) || Host(`s3-nas.core.codelooks.com`)"
      - "traefik.http.routers.garage-s3.entrypoints=websecure"
      - "traefik.http.routers.garage-s3.tls.certresolver=cloudflare"
      - "traefik.http.routers.garage-s3.service=garage-s3"
      - "traefik.http.services.garage-s3.loadbalancer.server.port=3900"

networks:
  traefik_network:
    external: true
