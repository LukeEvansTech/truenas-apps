---
# NAS Garage (S3 backup target) + its web UI. Adopts the existing data at
# /mnt/pool/apps/garage (buckets/layout persist). rpc_secret/admin_token +
# webui login are injected as env from 1Password (NOT in garage.toml).
# S3 + WebUI are fronted by Traefik (HTTPS); admin (3903) stays internal.
configs:
  garage_config:
    file: ./garage.toml

services:
  garage:
    container_name: garage
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    restart: unless-stopped
    configs:
      - source: garage_config
        target: /etc/garage.toml
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
    volumes:
      - /mnt/pool/apps/garage/meta:/var/lib/garage/meta
      - /mnt/pool/apps/garage/data:/var/lib/garage/data
    expose: ["3900", "3903"]
    networks: ["traefik_network"]
    labels:
      - "traefik.enable=true"
      # S3 API (path-style), both domains -> used by Veeam, Arq, the k8s sync job
      - "traefik.http.routers.garage-s3.rule=Host(`s3-nas.codelooks.com`) || Host(`s3-nas.core.codelooks.com`)"
      - "traefik.http.routers.garage-s3.entrypoints=websecure"
      - "traefik.http.routers.garage-s3.tls.certresolver=cloudflare"
      - "traefik.http.routers.garage-s3.service=garage-s3"
      - "traefik.http.services.garage-s3.loadbalancer.server.port=3900"

  webui:
    container_name: garage-webui
    image: khairul169/garage-webui:1.1.0@sha256:17c793551873155065bf9a022dabcde874de808a1f26e648d4b82e168806439c
    restart: unless-stopped
    depends_on: [garage]
    environment:
      API_BASE_URL: "http://garage:3903"
      API_ADMIN_KEY: ${GARAGE_ADMIN_TOKEN}
      S3_ENDPOINT_URL: "http://garage:3900"
      S3_REGION: us-east-1
      AUTH_USER_PASS: ${GARAGE_WEBUI_ADMIN_PASS}
    expose: ["3909"]
    networks: ["traefik_network"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.garage-webui.rule=Host(`garage-nas.codelooks.com`) || Host(`garage-nas.core.codelooks.com`)"
      - "traefik.http.routers.garage-webui.entrypoints=websecure"
      - "traefik.http.routers.garage-webui.tls.certresolver=cloudflare"
      - "traefik.http.routers.garage-webui.service=garage-webui"
      - "traefik.http.services.garage-webui.loadbalancer.server.port=3909"

networks:
  traefik_network:
    external: true
