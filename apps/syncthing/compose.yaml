---
# Syncthing. GUI fronted by Traefik (HTTPS); sync ports stay direct on the host
# (peer protocol, can't go through an HTTP proxy). All data consolidated under
# /mnt/pool/apps/syncthing: config/ (copied from the old ix-apps path — carries the
# device ID/keys, no re-pairing) and data/ (dataset zfs-renamed from pool/syncthing
# on 2026-06-15). The data/sideload subdir is NFS-exported (share id 25, RO) to the
# cluster feather nginx — its path was repointed in lockstep with this rename.
services:
  syncthing:
    container_name: syncthing
    image: syncthing/syncthing:2.1.1@sha256:775c4aac486263ca8653055bba7d3061799281974b706695e17bc798da3f4e92
    restart: unless-stopped
    hostname: cr-storage
    environment:
      PUID: "568"
      PGID: "568"
      TZ: Europe/London
      STGUIADDRESS: 0.0.0.0:8384
      STNOUPGRADE: "true"
    volumes:
      - /mnt/pool/apps/syncthing/config:/var/syncthing/config
      - /mnt/pool/apps/syncthing/data:/syncthing   # data dataset (renamed from pool/syncthing); /sideload NFS-exported to feather
    ports:
      - "22000:22000/tcp" # sync protocol
      - "22000:22000/udp" # sync (QUIC)
      - "21027:21027/udp" # local discovery
    networks: ["traefik_network"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`syncthing.codelooks.com`) || Host(`syncthing.core.codelooks.com`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls.certresolver=cloudflare"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"

networks:
  traefik_network:
    external: true
