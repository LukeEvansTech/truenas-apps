---
# The doco-cd controller itself — the ONE thing deployed by hand (or by the cron
# in scripts/, see README). It then polls this repo and deploys everything in apps/.
configs:
  poll-config.yml:
    content: |
      - url: https://github.com/LukeEvansTech/truenas-apps.git
        reference: main
        interval: 3600

secrets:
  1pw_token:
    file: /root/.doco-cd/1pw_token

services:
  app:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:0.93.0@sha256:57a87f68fc98cb45ed2ee9bee5bc2a598447a5788026b56009cfc7d96583776f
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # doco-cd state (git clones, deploy journal) on the pool, consolidated under
      # /mnt/pool/apps/* and snapshotted (not an anonymous volume on the boot area).
      - /mnt/pool/apps/doco-cd/data:/data
    secrets: ["1pw_token"]
    configs:
      - source: poll-config.yml
        target: /poll-config.yml
    environment:
      TZ: Europe/London
      LOG_LEVEL: info
      POLL_CONFIG_FILE: /poll-config.yml
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
    healthcheck:
      test: [CMD, /doco-cd, healthcheck]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
