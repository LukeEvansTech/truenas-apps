metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"
root_domain = ".s3-nas.codelooks.com"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web-nas.codelooks.com"

[admin]
api_bind_addr = "[::]:3903"
